<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zava Customer Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --lc-blue: #1F4FFF;
    --lc-blue-deep: #0A2BCC;
    --lc-blue-glow: #4D72FF;
    --accent: #00E5FF;
    --ink: #0B1020;
    --ink-2: #1A2238;
    --frost: rgba(255, 255, 255, 0.08);
    --frost-2: rgba(255, 255, 255, 0.05);
    --frost-stroke: rgba(255, 255, 255, 0.18);
    --text: #EAF0FF;
    --text-dim: rgba(234, 240, 255, 0.65);
    --bubble-user: linear-gradient(135deg, var(--lc-blue) 0%, var(--lc-blue-glow) 100%);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    color: var(--text);
    background: var(--ink);
    overflow: hidden;
  }
  /* Animated gradient mesh */
  body::before, body::after {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(31,79,255,0.45), transparent 50%),
      radial-gradient(ellipse at 80% 30%, rgba(77,114,255,0.30), transparent 55%),
      radial-gradient(ellipse at 50% 90%, rgba(10,43,204,0.40), transparent 50%),
      var(--ink);
    animation: drift 24s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-3%, -2%) scale(1.05); }
  }

  .app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; max-width: 880px; margin: 0 auto; padding: 24px 16px; gap: 16px; }

  header {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 20px;
    background: var(--frost); border: 1px solid var(--frost-stroke); border-radius: 18px;
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
  }
  header .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; }
  header .logo {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--lc-blue), var(--lc-blue-glow));
    box-shadow: 0 4px 16px rgba(31,79,255,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  header .title { line-height: 1; }
  header .title small { display: block; color: var(--text-dim); font-weight: 500; font-size: 11px; margin-top: 2px; }
  header select {
    appearance: none; -webkit-appearance: none;
    font-family: inherit; font-size: 13px; color: var(--text);
    background: var(--frost-2); border: 1px solid var(--frost-stroke);
    padding: 8px 30px 8px 12px; border-radius: 10px;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%), linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    cursor: pointer;
  }

  .thread {
    overflow-y: auto; padding: 8px 4px 8px 4px; scroll-behavior: smooth;
    display: flex; flex-direction: column; gap: 12px;
  }
  .thread::-webkit-scrollbar { width: 8px; }
  .thread::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  .bubble {
    max-width: 80%; padding: 12px 16px; border-radius: 16px; line-height: 1.55; font-size: 14.5px;
    white-space: pre-wrap; word-wrap: break-word;
    backdrop-filter: blur(24px) saturate(140%); -webkit-backdrop-filter: blur(24px) saturate(140%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .bubble.user { align-self: flex-end; background: var(--bubble-user); border: 1px solid rgba(255,255,255,0.25); color: white; }
  .bubble.assistant { align-self: flex-start; background: var(--frost); border: 1px solid var(--frost-stroke); }

  .step-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; margin: 0 0 6px 0;
    background: var(--frost-2); border: 1px solid var(--frost-stroke); border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--accent);
  }
  .step-pill::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
  }

  .tool-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; margin: 4px 4px 0 0;
    background: rgba(31,79,255,0.18); border: 1px solid rgba(77,114,255,0.4); border-radius: 8px;
    font-size: 11px; font-family: ui-monospace, SFMono-Regular, monospace; color: var(--text-dim);
  }
  .tool-chip::before { content: "🔧"; font-size: 11px; }

  .citation-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .citation {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; font-size: 11px;
    background: rgba(0,229,255,0.10); border: 1px solid rgba(0,229,255,0.3); border-radius: 6px;
    color: var(--accent);
  }
  .citation::before { content: "📎"; font-size: 10px; }

  .validation { display: inline-block; padding: 3px 8px; font-size: 11px; border-radius: 6px; margin-top: 6px; font-weight: 600; }
  .validation.asked { background: rgba(255,200,0,0.12); border: 1px solid rgba(255,200,0,0.4); color: #ffd97a; }

  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .suggestion {
    padding: 6px 12px; font-size: 13px; cursor: pointer;
    background: var(--frost-2); border: 1px solid var(--frost-stroke); border-radius: 999px;
    color: var(--text); transition: all 0.15s ease;
  }
  .suggestion:hover { background: rgba(31,79,255,0.25); border-color: var(--lc-blue-glow); }

  .composer {
    padding: 12px;
    background: var(--frost); border: 1px solid var(--frost-stroke); border-radius: 18px;
    backdrop-filter: blur(24px) saturate(140%); -webkit-backdrop-filter: blur(24px) saturate(140%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .first-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .composer .row { display: flex; align-items: flex-end; gap: 8px; }
  .composer textarea {
    flex: 1; resize: none; min-height: 44px; max-height: 160px;
    font-family: inherit; font-size: 14.5px; line-height: 1.5; color: var(--text);
    background: transparent; border: none; outline: none; padding: 8px;
  }
  .composer textarea::placeholder { color: var(--text-dim); }
  .composer button {
    appearance: none; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--lc-blue) 0%, var(--lc-blue-glow) 100%);
    color: white; font-weight: 600; font-family: inherit; font-size: 14px;
    padding: 10px 18px; border-radius: 12px;
    box-shadow: 0 4px 18px rgba(31,79,255,0.45), inset 0 1px 0 rgba(255,255,255,0.25);
    transition: transform 0.1s ease, box-shadow 0.15s ease;
  }
  .composer button:hover { box-shadow: 0 6px 22px rgba(31,79,255,0.6), inset 0 1px 0 rgba(255,255,255,0.3); }
  .composer button:active { transform: translateY(1px); }
  .composer button:disabled { opacity: 0.5; cursor: not-allowed; }

  .footer-credit { text-align: center; font-size: 11px; color: var(--text-dim); padding: 4px 0 0; }
  .footer-credit a { color: var(--text-dim); }

  /* ---- Debug drawer ---- */
  .debug-toggle {
    position: fixed; left: 16px; bottom: 16px; z-index: 50;
    width: 44px; height: 44px; border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    background: var(--frost-2); border: 1px solid var(--frost-stroke);
    color: var(--text); cursor: pointer; font-size: 20px;
    backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
    box-shadow: 0 6px 22px rgba(0,0,0,0.3);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .debug-toggle:hover { background: rgba(31,79,255,0.18); transform: translateY(-1px); }
  .debug-toggle .badge {
    position: absolute; top: -4px; right: -4px;
    min-width: 18px; height: 18px; padding: 0 5px;
    border-radius: 9px; background: var(--lc-blue);
    font-size: 10px; font-weight: 700; color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .debug-drawer {
    position: fixed; left: 16px; bottom: 70px; z-index: 49;
    width: min(440px, calc(100vw - 32px)); max-height: 60vh;
    display: flex; flex-direction: column;
    background: rgba(11, 16, 32, 0.85); border: 1px solid var(--frost-stroke);
    border-radius: 14px; overflow: hidden;
    backdrop-filter: blur(28px) saturate(140%); -webkit-backdrop-filter: blur(28px) saturate(140%);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    transform: translateY(8px); opacity: 0; pointer-events: none;
    transition: transform 0.18s ease, opacity 0.18s ease;
  }
  .debug-drawer.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .debug-drawer header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: rgba(31,79,255,0.12);
    border-bottom: 1px solid var(--frost-stroke);
    font-size: 13px; font-weight: 600; letter-spacing: 0.4px;
  }
  .debug-drawer header button {
    background: transparent; border: none; color: var(--text-dim);
    font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
  }
  .debug-drawer header button:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .debug-log {
    flex: 1; overflow-y: auto; padding: 8px 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; line-height: 1.45;
  }
  .debug-log::-webkit-scrollbar { width: 6px; }
  .debug-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  .dbg-turn {
    border-top: 1px dashed rgba(255,255,255,0.1); padding: 8px 0;
  }
  .dbg-turn:first-child { border-top: none; }
  .dbg-turn-head {
    color: var(--accent); font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .dbg-event { display: block; padding: 2px 0; color: var(--text); }
  .dbg-event .k { color: var(--lc-blue-glow); margin-right: 6px; }
  .dbg-event.tool .k { color: #FFB86B; }
  .dbg-event.step .k { color: var(--accent); }
  .dbg-event.citation .k { color: #B89BFF; }
  .dbg-event.error .k { color: #FF6B6B; }
  .dbg-empty { color: var(--text-dim); padding: 16px; text-align: center; font-style: italic; }

</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="logo"></div>
      <div class="title">Zava Support<small>Powered by LangChain v1 on Azure OpenAI</small></div>
    </div>
    <select id="customer-select" aria-label="Mock customer">
      <option value="">— No customer —</option>
    </select>
  </header>

  <div class="thread" id="thread"></div>

  <div class="composer">
    <div class="first-suggestions" id="first-suggestions">
      <div class="suggestion" data-text="Where is my most recent order?">Where is my most recent order?</div>
      <div class="suggestion" data-text="I need to return something I bought">I need to return something I bought</div>
      <div class="suggestion" data-text="My drill won't turn on">My drill won't turn on</div>
      <div class="suggestion" data-text="Do you sell a 16oz claw hammer?">Do you sell a 16oz claw hammer?</div>
    </div>
    <div class="row">
      <textarea id="composer-input" placeholder="Ask anything about your order, return, or product…" rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<button class="debug-toggle" id="debug-toggle" aria-label="Toggle debug panel" title="Debug">
  🐛<span class="badge" id="debug-badge" style="display:none">0</span>
</button>
<div class="debug-drawer" id="debug-drawer" role="region" aria-label="Agent debug panel">
  <header>
    <span>Agent debug</span>
    <button id="debug-clear">Clear</button>
  </header>
  <div class="debug-log" id="debug-log">
    <div class="dbg-empty">Send a message to see agent activity.</div>
  </div>
</div>

<script>
  const thread = document.getElementById("thread");
  const input = document.getElementById("composer-input");
  const sendBtn = document.getElementById("send-btn");
  const customerSelect = document.getElementById("customer-select");
  const firstSuggestions = document.getElementById("first-suggestions");
  const debugToggle = document.getElementById("debug-toggle");
  const debugDrawer = document.getElementById("debug-drawer");
  const debugLog = document.getElementById("debug-log");
  const debugBadge = document.getElementById("debug-badge");
  const debugClear = document.getElementById("debug-clear");

  let history = [];
  let threadId = null;
  let debugCount = 0;
  let currentDebugTurn = null;

  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function ts() {
    const d = new Date();
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${String(d.getMilliseconds()).padStart(3, "0")}`;
  }

  function startDebugTurn(userText) {
    if (debugLog.querySelector(".dbg-empty")) debugLog.innerHTML = "";
    const turn = el("div", "dbg-turn");
    const head = el("div", "dbg-turn-head", `[${ts()}] user: ${userText.slice(0, 60)}${userText.length > 60 ? "…" : ""}`);
    turn.appendChild(head);
    debugLog.appendChild(turn);
    debugLog.scrollTop = debugLog.scrollHeight;
    currentDebugTurn = turn;
  }

  function pushDebug(kind, label, detail) {
    if (!currentDebugTurn) return;
    const line = el("div", `dbg-event ${kind}`);
    const k = el("span", "k", `[${ts()}] ${label}`);
    line.appendChild(k);
    if (detail) {
      const v = document.createElement("span");
      v.textContent = detail;
      line.appendChild(v);
    }
    currentDebugTurn.appendChild(line);
    debugLog.scrollTop = debugLog.scrollHeight;
    debugCount++;
    if (!debugDrawer.classList.contains("open")) {
      debugBadge.style.display = "";
      debugBadge.textContent = String(debugCount);
    }
  }

  debugToggle.addEventListener("click", () => {
    debugDrawer.classList.toggle("open");
    if (debugDrawer.classList.contains("open")) {
      debugBadge.style.display = "none";
      debugCount = 0;
    }
  });
  debugClear.addEventListener("click", () => {
    debugLog.innerHTML = '<div class="dbg-empty">Send a message to see agent activity.</div>';
    currentDebugTurn = null;
    debugCount = 0; debugBadge.style.display = "none";
  });

  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined) e.textContent = text;
    return e;
  }

  function addBubble(role) {
    const wrap = el("div", "bubble " + role);
    if (role === "assistant") {
      wrap.appendChild(el("div", "text"));
    }
    thread.appendChild(wrap);
    thread.scrollTop = thread.scrollHeight;
    return wrap;
  }

  function addUser(text) {
    const b = addBubble("user");
    b.textContent = text;
  }

  async function loadCustomers() {
    try {
      const res = await fetch("/api/customers");
      const list = await res.json();
      list.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.customer_id;
        opt.textContent = `${c.name} (${c.email})`;
        opt.dataset.email = c.email;
        customerSelect.appendChild(opt);
      });
    } catch (e) { /* ignore */ }
  }

  async function send(text) {
    if (!text.trim()) return;
    firstSuggestions.style.display = "none";
    addUser(text);
    history.push({ role: "user", content: text });
    input.value = "";
    sendBtn.disabled = true;
    startDebugTurn(text);

    const bubble = addBubble("assistant");
    const textNode = bubble.querySelector(".text");

    let assistantText = "";

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          history: history.slice(0, -1),
          thread_id: threadId,
          customer_id: customerSelect.value || null,
        }),
      });
      if (!res.ok) {
        textNode.textContent = `Error: ${res.status}`;
        return;
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let idx;
        while ((idx = buf.indexOf("\n")) >= 0) {
          const line = buf.slice(0, idx).trim();
          buf = buf.slice(idx + 1);
          if (!line) continue;
          let ev;
          try { ev = JSON.parse(line); } catch { continue; }

          if (ev.thread_id) threadId = ev.thread_id;
          if (ev.step) {
            const labels = {
              triage: "triage (concierge)",
              order_lookup: "order_lookup",
              returns: "returns",
              tech_support: "tech_support",
              product_qna: "product_qna",
              resolution: "resolution",
            };
            pushDebug("step", "handoff →", labels[ev.step] || ev.step);
          }
          if (ev.chunk) {
            assistantText += ev.chunk;
            textNode.textContent = assistantText;
          }
          if (ev.tool) {
            pushDebug("tool", `tool ${ev.tool.name}(`, `${ev.tool.args_preview || ""})`);
          }
          if (ev.citation) {
            pushDebug("citation", `cite ${ev.citation.doc_id}:`, ev.citation.title);
          }
          if (ev.validation === "asked") {
            pushDebug("step", "validation:", "ungrounded — asking before escalating");
          }
          if (ev.suggestions) {
            const wrap = el("div", "suggestions");
            ev.suggestions.forEach(s => {
              const chip = el("div", "suggestion", s);
              chip.addEventListener("click", () => send(s));
              wrap.appendChild(chip);
            });
            bubble.appendChild(wrap);
          }
          if (ev.error) {
            textNode.textContent = `Error: ${ev.error}`;
            pushDebug("error", "error:", ev.error);
          }
          thread.scrollTop = thread.scrollHeight;
        }
      }
    } finally {
      sendBtn.disabled = false;
    }

    history.push({ role: "assistant", content: assistantText });
  }

  sendBtn.addEventListener("click", () => send(input.value));
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey || !e.shiftKey)) {
      e.preventDefault();
      send(input.value);
    }
  });
  firstSuggestions.querySelectorAll(".suggestion").forEach(s => {
    s.addEventListener("click", () => send(s.dataset.text));
  });

  loadCustomers();
</script>
</body>
</html>
